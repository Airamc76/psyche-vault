site_name: psyche-vault
site_description: Repositorio autodidacta de psicología a nivel universitario
site_author: Airam
site_url: https://airamc76.github.io/psyche-vault/

docs_dir: .
site_dir: ../psyche-vault-site

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

plugins:
  - same-dir
  - search:
      lang: es

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences

exclude_docs: |
  _site/
  .git/
  .gitignore
  requirements.txt

